name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase secrets
        run: |
          python3 << 'PYEOF'
          import os
          
          supabase_url = os.environ.get('SUPABASE_URL', '')
          anon_key = os.environ.get('SUPABASE_ANON_KEY', '')
          service_key = os.environ.get('SUPABASE_SERVICE_KEY', '')
          
          # Replace in app.js
          with open('webapp/assets/app.js', 'r') as f:
              content = f.read()
          content = content.replace(
              "SUPABASE_URL: ''",
              f"SUPABASE_URL: '{supabase_url}'"
          ).replace(
              "SUPABASE_ANON_KEY: ''",
              f"SUPABASE_ANON_KEY: '{anon_key}'"
          )
          with open('webapp/assets/app.js', 'w') as f:
              f.write(content)
          
          # Replace in app.html
          with open('webapp/app.html', 'r') as f:
              content = f.read()
          content = content.replace(
              "SUPABASE_URL: ''",
              f"SUPABASE_URL: '{supabase_url}'"
          ).replace(
              "SUPABASE_ANON_KEY: ''",
              f"SUPABASE_ANON_KEY: '{anon_key}'"
          )
          with open('webapp/app.html', 'w') as f:
              f.write(content)
          
          # Replace in admin.html
          with open('webapp/admin.html', 'r') as f:
              content = f.read()
          content = content.replace(
              "SUPABASE_URL: ''",
              f"SUPABASE_URL: '{supabase_url}'"
          ).replace(
              "SUPABASE_SERVICE_KEY: ''",
              f"SUPABASE_SERVICE_KEY: '{service_key}'"
          )
          with open('webapp/admin.html', 'w') as f:
              f.write(content)
          
          print("Secrets injected successfully!")
          PYEOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webapp
          publish_branch: gh-pages
          enable_jekyll: false
