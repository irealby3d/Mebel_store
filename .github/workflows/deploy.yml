name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase secrets
        run: |
          # Replace placeholders in app.js
          sed -i 's|SUPABASE_URL: window.SUPABASE_URL || '\'''\''|SUPABASE_URL: window.SUPABASE_URL || '\''${{ secrets.SUPABASE_URL }}'\''|g' webapp/assets/app.js
          sed -i 's|SUPABASE_ANON_KEY: window.SUPABASE_ANON_KEY || '\'''\''|SUPABASE_ANON_KEY: window.SUPABASE_ANON_KEY || '\''${{ secrets.SUPABASE_ANON_KEY }}'\''|g' webapp/assets/app.js
          
          # Replace placeholders in app.html
          sed -i 's|SUPABASE_URL: window.SUPABASE_URL || '\'''\''|SUPABASE_URL: window.SUPABASE_URL || '\''${{ secrets.SUPABASE_URL }}'\''|g' webapp/app.html
          sed -i 's|SUPABASE_ANON_KEY: window.SUPABASE_ANON_KEY || '\'''\''|SUPABASE_ANON_KEY: window.SUPABASE_ANON_KEY || '\''${{ secrets.SUPABASE_ANON_KEY }}'\''|g' webapp/app.html
          
          # Replace placeholders in admin.html  
          sed -i 's|SUPABASE_URL: window.SUPABASE_URL || '\''YOUR_SUPABASE_URL'\''|SUPABASE_URL: window.SUPABASE_URL || '\''${{ secrets.SUPABASE_URL }}'\''|g' webapp/admin.html
          sed -i 's|SUPABASE_SERVICE_KEY: window.SUPABASE_SERVICE_KEY || '\''YOUR_SERVICE_KEY'\''|SUPABASE_SERVICE_KEY: window.SUPABASE_SERVICE_KEY || '\''${{ secrets.SUPABASE_SERVICE_KEY }}'\''|g' webapp/admin.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webapp
          publish_branch: gh-pages
          enable_jekyll: false
